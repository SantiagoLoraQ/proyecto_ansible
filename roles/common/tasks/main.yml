---
# 1. Limpiar procesos que puedan atascar la instalacion
- name: Matar procesos zombis de PackageKit o zypper
  shell: |
    fuser -k /var/run/zypp.pid || true
    killall -9 packagekitd || true
  ignore_errors: yes

# 2. Optimizar actualizacion de repositorios con Reintentos
- name: Refrescar repositorios (con reintentos en caso de falla de red)
  command: zypper --non-interactive refresh
  register: repo_update
  until: repo_update.rc == 0
  retries: 3
  delay: 5
  ignore_errors: yes
